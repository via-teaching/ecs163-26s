<!doctype html>
<html style="width:100%;height:100%;">
<head>
	<meta charset="utf-8">
	<meta name="description" content="">
	<title>Music and Mental Health Dashboard</title>
	<style>
		body {
			width: 100vw;
			height: 100vh;
			margin: 0;
			padding: 0;
			display: flex;
			flex-direction: column;
			font-family: 'Arial', sans-serif;
			overflow: hidden;
		}
		/* overview panel / heatmap */
		#overview {
			width: 100%;
			height: 40vh;
			border-bottom: 1px solid #ccc;
		}
		/* bottom row with both views */
		#focus-row {
			width: 100%;
			height: 60vh;
			display: flex;
		}
		/* parallel coordinates */
		#parallel-coordinates {
			width: 55%;
			height: 100%;
			border-right: 1px solid #ccc;
		}
		/* scatter plot */
		#scatter-plot {
			width: 45%;
			height: 100%;
		}
		svg {
			width: 100%;
			height: 100%;
		}
	</style>
</head>
<body style="width:100%;height:100%;margin: 0;">
	<!-- Overview panel / heatmap -->
	<div id="overview"></div>
	<!-- Bottom row with both views -->
	<div id="focus-row">
		<div id="parallel-coordinates"></div>
		<div id="scatter-plot"></div>
	</div>

	<script src="https://d3js.org/d3.v5.min.js"></script>
	<script src="main.js"></script>
	<script>

	</script>
</body>
</html>
