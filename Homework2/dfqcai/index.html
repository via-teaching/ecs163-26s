<!DOCTYPE html>
<head>
	<meta charset="utf-8">
	<meta name="description" content="">
	<title>2023DS_salary_analysis</title>
</head>

<body style="width:100%;height:100%;margin: 0;">

    <div id="app">
        <nav class="navbar">
            <ul>
                <li
                    v-for="item in menu"
                    :key="item.id"
                    :class="{active: activeTab === item.id}"
                    @click="selectMenu(item.id)"
                    >
                    {{item.name}}
                </li>
            </ul>
        </nav>

        <div class="page">
             <div v-if="activeTab === 1" class="page_overview">
                <div :class="['frame_focus', graphs[0]]">
                
                </div>
                
                <div :class="['frame_r1', graphs[1]]" @click="selectPage(1)">
                    
                </div>
                
                <div :class="['frame_r2', graphs[2]]" @click="selectPage(2)">
                
                </div>
             </div>
        </div>

    </div>

    <style>
        * {
            margin: 0;
            padding: 0;
        }
           
        .page_overview{
            width: 100%;
            height: 85vh;
            border: 1px solid transparent;
            overflow: hidden;
            background-color: aqua;
            display: flex;
            gap: 3vw
    }

        .page_overview .frame_r1{
            margin-top: 37vh;
            width: 30vw;
            height: 43vh; /* =70*0.618 */
            background-color: purple;
    }

        .page_overview .frame_focus{
            margin-left: 10vh;
            margin-top: 10vh;
            width: 40vw;
            height: 70vh;
            background-color: red;
    }
    
        .page_overview .frame_r2{
            margin-top: 37vh;
            width: 30vw;
            height: 43vh;
            margin-right: 5%;
            background-color: pink;
    }
        .navbar ul{
            display: flex;
            background-color: rgb(8, 181, 220);
            padding: 5vh;
            list-style: none;
            flex-wrap: wrap;
            gap: 9vw;
            border-bottom: 1px solid black;
            justify-content: center;
        }
        .navbar li{
            margin-right: 20px;
            padding: auto;
            cursor: pointer;
            transition: all 0.3s;
        }
        .navbar li.active{
            color:dimgray;
            border-bottom: 2px solid gray;
            font-weight: bold;
        }
    </style>

	<script src="https://d3js.org/d3.v5.min.js"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    
	<script>
        const {createApp} = Vue
        createApp({
            data(){
                return {
                    r: ["frame_focus", "frame_r1", "frame_r2"],
                    activeTab: 1,
                    menu: [{id: 1, name: "Overview", page: "overview.js"}, {id: 2, name: "SankeyGraph", page: "sankey.js"}, {id: 3, name: "X", page: ""}, {id: 4, name: "Y", page: ""}],
                    graphs: ["graph_sankey", "graph_X", "graph_Y"]
                }
            },
            computed:{
                cur_content(){
                    const selected = this.menu.find(i => i.id === this.activeTab)
                    return selected ? selected.page : {}
                }
            },
            methods:{
                selectMenu(id){
                    this.activeTab = id
                },
                selectPage(index){
                    focus = this.graphs[index]
                    this.graphs.splice(index, 1)
                    this.graphs.unshift(focus)
                    console.info("now focusing on" + this.graphs[0])
                }
            }
        }).mount('#app')
    </script>
</body>
</html>
