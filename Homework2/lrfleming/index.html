<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Pokemon Stats Dashboard</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      overflow: auto;
    }

    #title {
      height: 58px;
      text-align: center;
      padding-top: 8px;
      box-sizing: border-box;
      background: white;
      border-bottom: 1px solid #ddd;
    }

    h1 {
      margin: 0;
      font-size: 24px;
    }

    p {
      margin: 4px 0 0 0;
      color: #555;
      font-size: 13px;
    }

    svg {
      width: 100vw;
      height: calc(100vh - 58px);
      background: white;
    }

    .chart-title {
      font-size: 16px;
      font-weight: bold;
    }

    .axis-label {
      font-size: 12px;
    }

    .legend-text {
      font-size: 11px;
    }
  </style>
</head>

<body>
  <div id="title">
    <h1>Pokemon Stats Dashboard</h1>
    <p>Exploring how Pokemon types relate to battle statistics and overall combat characteristics.</p>
  </div>

  <svg></svg>

  <script src="https://d3js.org/d3.v5.min.js"></script>
  <script src="main.js"></script>
</body>
</html>
