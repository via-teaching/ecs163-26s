<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Data Science Salaries Visualizations</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .row { display: flex; justify-content: space-around; flex-wrap: wrap; margin-bottom: 40px; }
        .chart-title { text-align: center; color: #333; }
        .chart-container { background: #f9f9f9; padding: 20px; border-radius: 8px; }
    </style>
</head>
<body>

    <h1 style="text-align: center;"> Data Science Salaries Visualizations</h1>
    
    <div class="row">
        <div class="chart-container" id="pie-view">
            <h3 class="chart-title"> Context 1: Experience Levels</h3>
        </div>
        
        <div class="chart-container" id="bar-view">
            <h3 class="chart-title"> Context 2: Salaries in the Data Science Industry</h3>
        </div>
    </div>

    <div class="row">
        <div class="chart-container" id="parallel-view" style="width: 100%;">
            <h3 class="chart-title"> Focus: Closer Look at Data Engineers </h3>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
