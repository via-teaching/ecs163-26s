<!doctype html>
<html style="width:100%;height:100%;">
<head>
	<meta charset="utf-8">
	<meta name="description" content="">
	<title>Student Mental Health Dashboard</title>
    <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #f5f6fa;
      color: #253047;
    }

    svg {
      width: 100vw;
    height: calc(100vh - 95px);
    display: block;
    }

    #dashboard-header {
    background: #000BA3;
    padding: 18px 28px;
    color: white;
    border-bottom: 2px solid #d9dde7;
}

#dashboard-header h1 {
    margin: 0;
    font-size: 34px;
    font-weight: bold;
}

#dashboard-header p {
    margin-top: 6px;
    margin-bottom: 0;
    font-size: 15px;
    color: #d7dcec;
}

    .chart-card {
      fill: white;
      stroke: #d9dde7;
      stroke-width: 1;
      rx: 10;
      ry: 10;
    }

    .chart-title {
      font-size: 18px;
      font-weight: bold;
      fill: #253047;
    }

    .axis text {
      font-size: 12px;
      fill: #444;
    }

    .axis path,
    .axis line {
      stroke: #c5c9d3;
    }

    .axis-label {
      font-size: 13px;
      fill: #444;
      font-weight: bold;
    }

    .bar-label,
    .heatmap-label {
      font-size: 12px;
      fill: #253047;
      font-weight: bold;
    }

    .legend-text {
      font-size: 12px;
      fill: #333;
    }
  </style>
</head>
<body style="width:100%;height:100%;margin: 0;">
    <div id="dashboard-header">
        <h1>Student Mental Health Dashboard</h1>
        <p>
            Exploring the distribution of students mental health responses across years of study and academic courses.
        </p>
    </div>
	<svg width="100%" height="100%">
	</svg>

	<script src="https://d3js.org/d3.v5.min.js"></script>
	<script src="main.js"></script>
	<script>

	</script>
</body>
</html>
