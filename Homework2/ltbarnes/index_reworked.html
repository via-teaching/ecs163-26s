<!doctype html>
<html style="width:100%;height:100%;">
<head>
  <meta charset="utf-8">
  <title>Pokémon Dashboard</title>
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: #fff;
      overflow: hidden;
    }

    /* Tooltip */
    #tooltip {
      position: fixed;
      background: rgba(0,0,0,0.75);
      color: #fff;
      border-radius: 4px;
      padding: 6px 10px;
      font-size: 12px;
      line-height: 1.5;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.1s;
      z-index: 100;
    }

    /* Legend */
    #legend {
      position: fixed;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 4px 14px;
      font-size: 10px;
      font-family: sans-serif;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .legend-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      display: inline-block;
    }

    /* D3 axes */
    .axis path, .axis line { stroke: #999; }
    .axis text { font-size: 10px; fill: #333; }
  </style>
</head>
<body>

<svg width="100%" height="100%"></svg>
<div id="legend"></div>
<div id="tooltip"></div>

<script src="https://d3js.org/d3.v5.min.js"></script>
<script src="main.js"></script>

</body>
</html>
