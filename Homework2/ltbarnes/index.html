<!doctype html>
<html style="width:100%;height:100%;">
<head>
  <meta charset="utf-8">
  <title>Pokémon Dashboard</title>
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h1 {
      margin: 16px 0 4px;
      font-size: 22px;
    }

    p.subtitle {
      margin: 0 0 12px;
      font-size: 13px;
      color: #555;
    }

    /* Three charts side by side */
    #dashboard {
      display: flex;
      flex-direction: row;
      justify-content: center;
      gap: 20px;
      width: 100%;
      padding: 0 10px;
      box-sizing: border-box;
    }

    .chart-box {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Tooltip */
    #tooltip {
      position: fixed;
      background: rgba(0,0,0,0.75);
      color: #fff;
      border-radius: 4px;
      padding: 6px 10px;
      font-size: 12px;
      line-height: 1.5;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.1s;
      z-index: 100;
    }

    /* Legend */
    #legend {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 6px 16px;
      margin: 12px auto 16px;
      max-width: 960px;
      font-size: 11px;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      display: inline-block;
    }

    /* D3 axes */
    .axis path, .axis line { stroke: #999; }
    .axis text { font-size: 10px; fill: #333; }
  </style>
</head>
<body>

<h1>Pokémon Dashboard</h1>
<p class="subtitle">Exploring 721 Pokémon — Type Distribution · Attack vs Speed · Stat Profiles</p>

<div id="dashboard">
  <div class="chart-box" id="bar-box"></div>
  <div class="chart-box" id="scatter-box"></div>
  <div class="chart-box" id="parallel-box"></div>
</div>

<div id="legend"></div>
<div id="tooltip"></div>

<script src="https://d3js.org/d3.v5.min.js"></script>
<script>

// Pokémon type -> color lookup table
var TYPE_COLORS = {
  Normal:"#A8A878", Fire:"#F08030",   Water:"#6890F0",  Grass:"#78C850",
  Electric:"#F8D030", Ice:"#98D8D8", Fighting:"#C03028", Poison:"#A040A0",
  Ground:"#E0C068", Flying:"#A890F0", Psychic:"#F85888", Bug:"#A8B820",
  Rock:"#B8A038",  Ghost:"#705898",  Dragon:"#7038F8",  Dark:"#705848",
  Steel:"#B8B8D0", Fairy:"#EE99AC"
};
var TYPES = Object.keys(TYPE_COLORS);

// Grab type color, default to gray if missing
function typeColor(t) { return TYPE_COLORS[t] || "#aaa"; }

// Tooltip helpers
var tip = d3.select("#tooltip");
function showTip(html, evt) {
  tip.html(html).style("opacity",1)
     .style("left",(evt.clientX+12)+"px")
     .style("top",(evt.clientY-8)+"px");
}
function moveTip(evt) {
  tip.style("left",(evt.clientX+12)+"px").style("top",(evt.clientY-8)+"px");
}
function hideTip() { tip.style("opacity",0); }

// use d3 csv splitting
d3.csv("data/pokemon_alopez247.csv", function(d) {
  
  return {
    Name:        d.Name,
    Type_1:      d.Type_1,
    Type_2:      d.Type_2,
    Total:       +d.Total,
    HP:          +d.HP,
    Attack:      +d.Attack,
    Defense:     +d.Defense,
    Sp_Atk:      +d.Sp_Atk,
    Sp_Def:      +d.Sp_Def,
    Speed:       +d.Speed,
    Generation:  +d.Generation,
    isLegendary: d.isLegendary === "True"
  };
}).then(function(data) {
  buildBarChart(data);
  buildScatter(data);
  buildParallel(data);
  buildLegend();
});

// Bar chart
// HW1 and WS1
// 
function buildBarChart(data) {

  // Chart sizing + margins
  var W = 340, H = 420;
  var margin = { top: 40, right: 20, bottom: 110, left: 52 };
  var iW = W - margin.left - margin.right;
  var iH = H - margin.top - margin.bottom;

  // Count Pokémon by primary type and sort highest first
  var counts = d3.nest()
    .key(function(d) { return d.Type_1; })
    .rollup(function(v) { return v.length; })
    .entries(data)
    .sort(function(a,b) { return b.value - a.value; });

  var svg = d3.select("#bar-box").append("svg")
    .attr("width", W).attr("height", H);

  // Chart title
  svg.append("text")
    .attr("x", W/2).attr("y", 22)
    .attr("text-anchor","middle")
    .style("font-size","14px").style("font-weight","bold")
    .text("Pokémon Count by Primary Type");

  var g = svg.append("g")
    .attr("transform","translate("+margin.left+","+margin.top+")");

  // Position each type along the x-axis
  var x = d3.scaleBand()
    .domain(counts.map(function(d){ return d.key; }))
    .range([0, iW])
    .padding(0.2);

  // Scale for Pokémon count
  var y = d3.scaleLinear()
    .domain([0, d3.max(counts, function(d){ return d.value; })])
    .range([iH, 0])
    .nice();

  // Draw bars using type colors
  g.selectAll("rect")
    .data(counts)
    .enter().append("rect")
      .attr("x", function(d){ return x(d.key); })
      .attr("y", function(d){ return y(d.value); })
      .attr("width", x.bandwidth())
      .attr("height", function(d){ return iH - y(d.value); })
      .attr("fill", function(d){ return typeColor(d.key); })
    .on("mouseover", function(d) {
      d3.select(this).attr("opacity", 0.7);
      showTip("<b>"+d.key+"</b><br>Count: "+d.value, d3.event);
    })
    .on("mousemove", function() { moveTip(d3.event); })
    .on("mouseout", function() {
      d3.select(this).attr("opacity", 1);
      hideTip();
    });

  // Rotate labels so all type names fit
  g.append("g")
    .attr("class","axis")
    .attr("transform","translate(0,"+iH+")")
    .call(d3.axisBottom(x).tickSize(0))
    .selectAll("text")
      .attr("transform","rotate(-45)")
      .style("text-anchor","end")
      .attr("dx","-0.5em").attr("dy","0.1em")
      .style("font-size","9px")
      .style("fill", function(d){ return typeColor(d); });

  // Add y-axis
  g.append("g")
    .attr("class","axis")
    .call(d3.axisLeft(y).ticks(5));

  // Y-axis label
  g.append("text")
    .attr("transform","translate(-40,"+(iH/2)+") rotate(-90)")
    .attr("text-anchor","middle")
    .style("font-size","11px").style("fill","#555")
    .text("Number of Pokémon");

  // X-axis label
  g.append("text")
    .attr("x", iW/2).attr("y", iH + 105)
    .attr("text-anchor","middle")
    .style("font-size","11px").style("fill","#555")
    .text("Primary Type");
}

// Scatter plot
// Copied from HW1
// Added hover functionality from WS2
function buildScatter(data) {

  // Chart sizing + margins
  var W = 340, H = 420;
  var margin = { top: 40, right: 20, bottom: 50, left: 55 };
  var iW = W - margin.left - margin.right;
  var iH = H - margin.top - margin.bottom;

  var svg = d3.select("#scatter-box").append("svg")
    .attr("width", W).attr("height", H);

  // Chart title
  svg.append("text")
    .attr("x", W/2).attr("y", 22)
    .attr("text-anchor","middle")
    .style("font-size","14px").style("font-weight","bold")
    .text("Attack vs. Speed by Type");

  var g = svg.append("g")
    .attr("transform","translate("+margin.left+","+margin.top+")");

  // Scale attack and speed values
  var x = d3.scaleLinear()
    .domain([0, d3.max(data, function(d){ return d.Attack; }) + 10])
    .range([0, iW]).nice();

  var y = d3.scaleLinear()
    .domain([0, d3.max(data, function(d){ return d.Speed; }) + 10])
    .range([iH, 0]).nice();

  // Draw normal Pokémon first so legendary ones stay visible
  var nonLeg = data.filter(function(d){ return !d.isLegendary; });
  var leg    = data.filter(function(d){ return  d.isLegendary; });

  // Draw Pokémon points
  function drawDots(subset, radius, strokeCol) {
    g.selectAll(null)
      .data(subset)
      .enter().append("circle")
        .attr("cx", function(d){ return x(d.Attack); })
        .attr("cy", function(d){ return y(d.Speed); })
        .attr("r", radius)
        .attr("fill", function(d){ return typeColor(d.Type_1); })
        .attr("opacity", 0.65)
        .attr("stroke", strokeCol || "none")
        .attr("stroke-width", strokeCol ? 1.5 : 0)
      .on("mouseover", function(d) {
        d3.select(this).raise().attr("r", radius*2).attr("opacity",1);
        showTip(
          "<b>"+d.Name+"</b><br>"+
          "Type: "+d.Type_1+(d.Type_2?"/"+d.Type_2:"")+"<br>"+
          "Attack: "+d.Attack+"  Speed: "+d.Speed+
          (d.isLegendary?"<br>★ Legendary":""),
          d3.event
        );
      })
      .on("mousemove", function() { moveTip(d3.event); })
      .on("mouseout", function() {
        d3.select(this).attr("r", radius).attr("opacity",0.65);
        hideTip();
      });
  }

  drawDots(nonLeg, 3, null);
  // Add a red border around legendary Pokémon
  drawDots(leg, 4.5, "#e60000");

  // Show note explaining legendary outline
  // Not nessecary but it's interesting
  g.append("text")
    .attr("x", iW).attr("y", 0)
    .attr("text-anchor","end")
    .style("font-size","10px").style("fill","#e60000")
    .text("red outline = Legendary");

  // Add axes
  g.append("g")
    .attr("class","axis")
    .attr("transform","translate(0,"+iH+")")
    .call(d3.axisBottom(x).ticks(6));

  g.append("g")
    .attr("class","axis")
    .call(d3.axisLeft(y).ticks(6));

  // Axis labels
  g.append("text")
    .attr("x", iW/2).attr("y", iH+40)
    .attr("text-anchor","middle")
    .style("font-size","11px").style("fill","#555")
    .text("Attack");

  g.append("text")
    .attr("transform","translate(-43,"+(iH/2)+") rotate(-90)")
    .attr("text-anchor","middle")
    .style("font-size","11px").style("fill","#555")
    .text("Speed");
}

// Parallel coordinates chart
function buildParallel(data) {

  // Chart sizing + margins
  var W = 420, H = 420;
  var margin = { top: 50, right: 30, bottom: 20, left: 30 };
  var iW = W - margin.left - margin.right;
  var iH = H - margin.top - margin.bottom;

  // Stats shown in the parallel coordinates chart
  var dims = ["HP","Attack","Defense","Sp_Atk","Sp_Def","Speed"];

  var svg = d3.select("#parallel-box").append("svg")
    .attr("width", W).attr("height", H);

  // Chart title
  svg.append("text")
    .attr("x", W/2).attr("y", 22)
    .attr("text-anchor","middle")
    .style("font-size","14px").style("font-weight","bold")
    .text("Six-Stat Profile (Parallel Coordinates)");

  var g = svg.append("g")
    .attr("transform","translate("+margin.left+","+margin.top+")");

  // Position stat dimensions
  var xPos = d3.scalePoint()
    .domain(dims)
    .range([0, iW])
    .padding(0.1);

  // Create scales for each stat
  var yScales = {};
  dims.forEach(function(dim) {
    yScales[dim] = d3.scaleLinear()
      .domain([0, d3.max(data, function(d){ return d[dim]; })])
      .range([iH, 0])
      .nice();
  });

  // Build a path for a single Pokémon stat profile
  function pathFor(d) {
    return d3.line()(
      dims.map(function(dim) {
        return [xPos(dim), yScales[dim](d[dim])];
      })
    );
  }

  // Draw each Pokémon stat profile
  var lines = g.append("g")
    .selectAll("path")
    .data(data)
    .enter().append("path")
      .attr("d", pathFor)
      .attr("fill","none")
      .attr("stroke", function(d){ return typeColor(d.Type_1); })
      .attr("stroke-width", 0.8)
      .attr("opacity", 0.18);

  // Highlight current Pokémon on hover
  lines
    .on("mouseover", function(d) {
      d3.select(this).raise()
        .attr("stroke-width", 2.5).attr("opacity", 1);
      showTip(
        "<b>"+d.Name+"</b><br>"+
        "Type: "+d.Type_1+(d.Type_2?"/"+d.Type_2:"")+"<br>"+
        "HP:"+d.HP+" ATK:"+d.Attack+" DEF:"+d.Defense+"<br>"+
        "SpA:"+d.Sp_Atk+" SpD:"+d.Sp_Def+" SPE:"+d.Speed,
        d3.event
      );
    })
    .on("mousemove", function() { moveTip(d3.event); })
    .on("mouseout", function() {
      d3.select(this).attr("stroke-width", 0.8).attr("opacity", 0.18);
      hideTip();
    });

  // Add one axis for each stat
  dims.forEach(function(dim) {
    var axisG = g.append("g")
      .attr("transform","translate("+xPos(dim)+",0)");

    axisG.call(d3.axisLeft(yScales[dim]).ticks(5));

    // Add axis labels
    axisG.append("text")
      .attr("y", -14)
      .attr("text-anchor","middle")
      .style("font-size","11px")
      .style("font-weight","bold")
      .style("fill","#333")
      .text(dim);
  });
}

// Build type legend
function buildLegend() {
  var legend = d3.select("#legend");
  TYPES.forEach(function(type) {
    var item = legend.append("div").attr("class","legend-item");
    item.append("span").attr("class","legend-dot")
      .style("background", typeColor(type));
    item.append("span").text(type);
  });
}

</script>
</body>
</html>
