<!doctype html>
<html lang="en" style="width: 100%; height: 100%;">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="ECS163 Homework 2 Pokemon dashboard">
  <title>Pokemon Dashboard - ECS163 Homework 2</title>
  <style>
    :root {
      --bg: #f3efe4;
      --panel: #fffdf7;
      --ink: #1f2a30;
      --muted: #5b6a72;
      --stroke: #d7d0bf;
      --accent: #146356;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 10% 10%, #fff8df 0%, transparent 35%),
        radial-gradient(circle at 95% 15%, #d6efe8 0%, transparent 30%),
        var(--bg);
      overflow: hidden;
    }

    #app {
      position: relative;
      width: 100%;
      height: 100%;
    }

    #dashboard {
      width: 100%;
      height: 100%;
      display: block;
    }
  </style>
</head>
<body>
  <div id="app">
    <svg id="dashboard" aria-label="Pokemon statistics dashboard"></svg>
  </div>

  <script src="https://d3js.org/d3.v5.min.js"></script>
  <script src="main.js"></script>
</body>
</html>
