<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pokemon Dashboard</title>
    <script src="https://d3js.org/d3.v6.min.js"></script>
    <style>
        body { 
            font-family: sans-serif; 
            margin: 0; 
            background-color: #f4f4f4; 
            overflow: hidden; 
        }
        /* fit browser window */
        .dashboard { 
            display: grid; 
            grid-template-columns: 1fr 1.5fr; 
            grid-template-rows: 1fr 1.8fr;    
            gap: 15px; 
            height: 100vh; 
            padding: 15px; 
            box-sizing: border-box; 
        }
        .vis-container { 
            border: 1px solid #000000; 
            background: #ffffff; 
            display: flex; 
            flex-direction: column;
            border-radius: 4px;
        }
        .full-width { 
            grid-column: span 2; 
        }
        h3 { 
            margin: 10px; 
            font-size: 16px; 
            text-align: center; 
            color: #333; 
        }
        svg { 
            width: 100%; 
            height: 100%; 
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <div id="vis1" class="vis-container">
            <h3>Average Total Base Stats by Type</h3>
        </div>
        <div id="vis2" class="vis-container">
            <h3>Avg Stats for Types Across Generations</h3>
        </div>
        <div id="vis3" class="vis-container full-width">
            <h3>Base Stat Profiles of Top 18 Pokemon based on Total Stats</h3>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
