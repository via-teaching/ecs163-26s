<!doctype html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="description" content="">
	<title>Pokemon Visualization Dashboard</title>
	<link rel="stylesheet" href="styles.css">
</head>
<body>
	<main class="dashboard">
		<section id="parallel-panel" class="panel parallel-panel">
			<h2>Generation-Type-Legendary: Sankey</h2>
			<p class="chart-subtitle">Grouped flow into legendary status</p>
			<div id="sankey-flow" class="chart-container"></div>
		</section>
		<section id="heatmap-panel" class="panel heatmap-panel">
			<h2>Data Overview: 2D Heatmap</h2>
			<p class="chart-subtitle">Type counts by generation</p>
			<div id="type-generation-heatmap" class="chart-container"></div>
		</section>
		<section id="scatter-panel" class="panel scatter-panel">
			<div class="bar-panel-header">
				<div>
					<h2>Type & Strength: Bar Chart</h2>
					<p class="chart-subtitle">Brush adjacent type-strength groups</p>
				</div>
				<button id="clear-brush" class="brush-reset" type="button">Clear Brush</button>
			</div>
			<div class="bar-control-row">
				<label class="metric-control" for="bar-metric-select">
					<span>Metric</span>
					<select id="bar-metric-select">
						<option value="total" selected>Total</option>
						<option value="attack">Attack</option>
						<option value="defense">Defense</option>
						<option value="speed">Speed</option>
						<option value="hp">HP</option>
						<option value="spAtk">Sp. Atk</option>
						<option value="spDef">Sp. Def</option>
					</select>
				</label>
			</div>
			<div id="type-strength-bar-chart" class="chart-container"></div>
		</section>
	</main>
	<button id="clear-selection" class="selection-reset" type="button">Clear selection</button>
	<div id="tooltip" class="tooltip"></div>

	<script src="https://d3js.org/d3.v5.min.js"></script>
	<script src="main.js"></script>
</body>
</html>
