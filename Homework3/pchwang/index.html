<!doctype html>
<html style="width:100%;height:100%;">
<head>
    <meta charset="utf-8">
    <title>Pokémon Dashboard – HW3</title>
    <style>
        * { box-sizing: border-box; }

        body {
            margin: 0;
            width: 100%;
            height: 100vh;
            background: #1a1a2e;
            display: grid;
            grid-template-rows: auto 1fr 1fr 1fr;
            grid-template-columns: 1fr;
            overflow: hidden;
        }

        #header {
            color: #bbb;
            font-family: sans-serif;
            font-size: 12px;
            padding: 6px 18px;
            background: #12122a;
            border-bottom: 1px solid #333;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        #chart1, #chart2, #chart3 {
            width: 100%;
            height: 100%;
            min-height: 0;
        }

        svg { width: 100%; height: 100%; }

        .chart-title {
            fill: #eee;
            font-family: sans-serif;
            font-size: 13px;
            font-weight: bold;
        }

        .axis text {
            fill: #bbb;
            font-family: sans-serif;
            font-size: 10px;
        }

        .axis line, .axis path { stroke: #555; }

        .axis-label {
            fill: #aaa;
            font-family: sans-serif;
            font-size: 11px;
        }

        .instruction {
            fill: #555;
            font-family: sans-serif;
            font-size: 10px;
            font-style: italic;
            pointer-events: none;
        }

        .brush .selection {
            fill: rgba(255,255,255,0.12);
            stroke: #aaa;
            stroke-width: 1px;
        }
        .brush .handle { fill: #ccc; }

        #tooltip {
            position: fixed;
            background: rgba(15,15,40,0.95);
            color: #eee;
            font-family: sans-serif;
            font-size: 11px;
            line-height: 1.6;
            padding: 8px 11px;
            border-radius: 6px;
            border: 1px solid #444;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.12s;
            z-index: 100;
            max-width: 200px;
        }
    </style>
</head>
<body>

    <div id="header">
        <strong style="color:white;font-size:13px;">Pokémon Dashboard</strong>
        <span style="color:#444">|</span>
        <span><em style="color:#FFD60A">① Overview:</em> drag to brush types in the bar chart</span>
        <span style="color:#444">→</span>
        <span><em style="color:#4895EF">② Focus:</em> click any dot to select a Pokémon</span>
        <span style="color:#444">→</span>
        <span><em style="color:#52B788">③ Detail:</em> see its stats vs the type average below</span>
    </div>

    <div id="chart1"><svg></svg></div>
    <div id="chart2"><svg></svg></div>
    <div id="chart3"><svg></svg></div>

    <div id="tooltip"></div>

    <script src="https://d3js.org/d3.v5.min.js"></script>
    <script src="main.js"></script>
</body>
</html>
