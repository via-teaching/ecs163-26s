<!doctype html>
<html style="width:100%;height:100%;">
<head>
  <meta charset="utf-8">
  <title>Data Science Salaries — HW3 Interactive Dashboard</title>
  <style>
    * { box-sizing: border-box; }
    body {
      background: #0d1117;
      margin: 0;
      font-family: monospace;
      color: #e6edf3;
      overflow: hidden;
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Top bar ── */
    #topbar {
      flex: 0 0 44px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      background: #161b22;
      border-bottom: 1px solid #30363d;
      font-size: 12px;
      color: #8b949e;
    }
    #topbar h1 { font-size: 13px; color: #e6edf3; margin: 0; }
    #topbar span { color: #58a6ff; }

    /* ── Filter bar ── */
    #filterbar {
      flex: 0 0 40px;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 16px;
      background: #0d1117;
      border-bottom: 1px solid #21262d;
      font-size: 11px;
    }
    #filterbar label { color: #8b949e; }
    #filterbar select {
      background: #161b22;
      color: #e6edf3;
      border: 1px solid #30363d;
      border-radius: 4px;
      padding: 2px 6px;
      font-family: monospace;
      font-size: 11px;
      cursor: pointer;
    }
    #filterbar select:hover { border-color: #58a6ff; }
    #reset-btn {
      margin-left: auto;
      background: #21262d;
      color: #58a6ff;
      border: 1px solid #30363d;
      border-radius: 4px;
      padding: 3px 10px;
      font-family: monospace;
      font-size: 11px;
      cursor: pointer;
    }
    #reset-btn:hover { background: #30363d; }
    #sel-info { color: #f0c040; font-size: 11px; }

    /* ── Main SVG area ── */
    #canvas {
      flex: 1 1 0;
      position: relative;
    }
    svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    /* shared d3 styles */
    .axis text { font-family: monospace; font-size: 10px; fill: #8b949e; }
    .axis line, .axis path { stroke: #30363d; }
    .domain { stroke: #30363d; }
    .grid line { stroke: #21262d; stroke-dasharray: 2,4; }
    .grid path { stroke: none; }
    .pcp-line { fill: none; stroke-width: 1.2; opacity: 0.28; transition: opacity 0.15s; }
    .pcp-line.highlighted { opacity: 1 !important; stroke-width: 2.5; }
    .pcp-line.dimmed { opacity: 0.06 !important; }

    /* brush */
    .selection { fill: #58a6ff22; stroke: #58a6ff; stroke-width: 1px; }
    .handle { fill: #58a6ff55; }

    /* tooltip */
    .tooltip {
      position: fixed;
      display: none;
      background: #161b22;
      border: 1px solid #30363d;
      padding: 8px 12px;
      font-family: monospace;
      font-size: 11px;
      color: #e6edf3;
      pointer-events: none;
      z-index: 999;
      border-radius: 4px;
      box-shadow: 0 4px 12px #00000088;
    }

    /* bar / grouped bar hover */
    rect.bar:hover { filter: brightness(1.3); cursor: pointer; }
    rect.bar.selected { stroke: #f0c040; stroke-width: 2; }

    /* annotation text */
    .anno { font-family: monospace; font-size: 10px; fill: #8b949e; }
    .chart-title { font-family: monospace; font-size: 12px; fill: #e6edf3; }
    .axis-label { font-family: monospace; font-size: 10px; fill: #8b949e; }
  </style>
</head>
<body>

  <div id="topbar">
    <h1>Data Science Salaries — <span>Interactive Dashboard</span></h1>
    <span id="sel-info">Showing all records</span>
  </div>

  <div id="filterbar">
    <label>Experience:</label>
    <select id="exp-filter">
      <option value="ALL">All</option>
      <option value="EN">Entry</option>
      <option value="MI">Mid</option>
      <option value="SE">Senior</option>
      <option value="EX">Executive</option>
    </select>

    <label>Year:</label>
    <select id="year-filter">
      <option value="ALL">All</option>
      <option value="2020">2020</option>
      <option value="2021">2021</option>
      <option value="2022">2022</option>
      <option value="2023">2023</option>
    </select>

    <label>Company Size:</label>
    <select id="size-filter">
      <option value="ALL">All</option>
      <option value="S">Small</option>
      <option value="M">Medium</option>
      <option value="L">Large</option>
    </select>

    <button id="reset-btn">↺ Reset</button>
  </div>

  <div id="canvas">
    <svg id="main-svg"></svg>
  </div>

  <div class="tooltip" id="tooltip"></div>

  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="main.js"></script>
</body>
</html>
