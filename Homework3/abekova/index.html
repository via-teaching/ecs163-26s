<!DOCTYPE html>
<html lang="en" style="width:100%; height:100%;">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Alcohol Consumption Dashboard</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100vh;
        }
        .chart-container {
            width: 100%;
            border-bottom: 1px solid #ccc;
            padding: 10px;
            box-sizing: border-box;
        }
        #overview { height: 30%; }
        #focus { height: 35%; }
        #advanced { height: 35%; }
        h2 { margin: 5px 0; font-size: 16px; color: #333; }
    </style>
</head>
<body style="width:100%; height:100%; margin: 0;">

    <div id="overview" class="chart-container">
        <h2> Alcohol Consumption Distribution</h2>
    </div>

    <div id="focus" class="chart-container">
        <h2> Grades vs. Alcohol Consumption</h2>
    </div>

    <div id="advanced" class="chart-container">
        <h2> Multi-Dimensional Analysis</h2>
    </div>

    <script src="https://d3js.org/d3.v5.min.js"></script>
    <script src="main.js"></script>

</body>
</html>
