<!doctype html>
<html style="width:100%;height:100%;">
<head>
  <meta charset="utf-8">
  <title>Pokemon Dashboard - HW3</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: #f5f5f5;
    }
 
    h1 {
      text-align: center;
      padding: 10px;
      margin: 0;
      background: #cc0000;
      color: white;
      font-size: 20px;
    }
 
    #controls {
      padding: 8px 12px;
      background: white;
      border-bottom: 1px solid #ddd;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 6px;
    }
 
    #controls label {
      font-size: 13px;
      font-weight: bold;
      margin-right: 4px;
    }
 
    .type-btn {
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 12px;
      border: 1.5px solid transparent;
      cursor: pointer;
      opacity: 0.45;
    }
    .type-btn.active { opacity: 1; border-color: #333; }
 
    #selected-info {
      margin-left: auto;
      font-size: 12px;
      color: #555;
    }
 
    .dashboard {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 340px 340px;
      gap: 8px;
      padding: 8px;
      height: calc(100vh - 90px);
      box-sizing: border-box;
    }
 
    .panel {
      background: white;
      border: 1px solid #ccc;
      border-radius: 4px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
 
    .panel-title {
      font-size: 13px;
      font-weight: bold;
      padding: 6px 10px;
      border-bottom: 1px solid #eee;
      background: #fafafa;
      display: flex;
      align-items: center;
      gap: 6px;
    }
 
    .panel-title .hint {
      font-weight: normal;
      font-size: 11px;
      color: #888;
      margin-left: auto;
    }
 
    .panel svg { flex: 1; }
 
    .panel.wide { grid-column: 1 / 3; }
 
    .mode-btn {
      font-size: 11px;
      padding: 2px 8px;
      border: 1px solid #aaa;
      background: white;
      border-radius: 3px;
      cursor: pointer;
    }
    .mode-btn.active { background: #cc0000; color: white; border-color: #cc0000; }
 
    #tooltip {
      position: fixed;
      pointer-events: none;
      background: white;
      border: 1px solid #aaa;
      border-radius: 4px;
      padding: 8px 10px;
      font-size: 12px;
      line-height: 1.6;
      max-width: 180px;
      opacity: 0;
      transition: opacity .1s;
      z-index: 999;
      box-shadow: 2px 2px 4px rgba(0,0,0,0.15);
    }
    #tooltip.show { opacity: 1; }
    #tooltip strong { display: block; margin-bottom: 2px; }
  </style>
</head>
<body>
 
<h1>Pokemon Stats Dashboard</h1>
 
<div id="controls">
  <label>Filter by type:</label>
  <div id="type-filter" style="display:flex;flex-wrap:wrap;gap:5px;"></div>
  <span id="selected-info"></span>
</div>
 
<div class="dashboard">
 
  <div class="panel" id="panel-scatter">
    <div class="panel-title">
      Attack vs Defense
      <div style="display:flex;gap:4px;margin-left:8px;">
        <button class="mode-btn active" id="btn-brush">Brush</button>
        <button class="mode-btn" id="btn-zoom">Zoom/Pan</button>
        <button class="mode-btn" id="btn-reset">Reset</button>
      </div>
      <span class="hint" id="scatter-hint">Drag to brush · click dot to filter type</span>
    </div>
    <svg id="scatter-svg"></svg>
  </div>
 
  <div class="panel" id="panel-parallel">
    <div class="panel-title">
      Parallel Coordinates (Stats)
      <span class="hint">Highlighted by brush selection</span>
    </div>
    <svg id="parallel-svg"></svg>
  </div>
 
  <div class="panel wide" id="panel-bar">
    <div class="panel-title">
      Count by Primary Type
      <span class="hint">Click a bar to filter · updates with brush selection</span>
    </div>
    <svg id="bar-svg"></svg>
  </div>
 
</div>
 
<div id="tooltip"></div>
 
<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="main.js"></script>
</body>
</html>
