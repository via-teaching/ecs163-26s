<!doctype html>
<html style="width:100%;height:100%;">
<head>
	<meta charset="utf-8">
	<meta name="description" content="ECS 163 HW3 - Music & Mental Health dashboard with interactions and animated transitions (bbrle)">
	<title>Music &amp; Mental Health Dashboard - HW3</title>
	<style>
		/* Full-viewport, no scrollbars: the SVG fills the browser and the
		   resize handler in main.js keeps every view inside the viewport. */
		html, body { width: 100%; height: 100%; margin: 0; }
		body { font-family: -apple-system, "Segoe UI", Helvetica, Arial, sans-serif; }
		svg { display: block; }                 /* remove inline-SVG baseline gap */
		.view-title { font-size: 17px; font-weight: 600; }
		.view-subtitle { font-size: 11px; fill: #555; }
		.axis-label { font-size: 13px; }
		.legend-label { font-size: 12px; }
		.axis text { font-size: 11px; }
		.cell-text { font-size: 10px; pointer-events: none; }
		.bar { cursor: pointer; }
		.bar-hit { cursor: pointer; }
		.col-header { cursor: pointer; user-select: none; }
		.reset-btn { cursor: pointer; user-select: none; }
		.brush .selection { fill: #4C78A8; fill-opacity: 0.18; stroke: #4C78A8; }
	</style>
</head>
<body style="width:100%;height:100%;margin: 0;">
	<!-- Single SVG canvas. main.js sizes it to the viewport and draws the
	     three dashboard panels as transformed <g> groups. -->
	<svg width="100%" height="100%"></svg>

	<script src="https://d3js.org/d3.v5.min.js"></script>
	<script src="main.js"></script>
</body>
</html>
