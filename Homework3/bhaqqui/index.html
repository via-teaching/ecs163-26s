<!doctype html>
<html style="width:100%;height:100%;">
<head>
    <meta charset="utf-8">
    <meta name="description" content="ECS 163 Homework 3 interactive dashboard exploring Pokemon battle stats by type.">
    <title>Pokemon Battle Stats Dashboard — Interactive</title>
    <style>
        html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; background: #fafafa; }
        svg { display: block; width: 100%; height: 100%; }
        .view-title { font-size: 18px; font-weight: 600; fill: #222; }
        .dashboard-title { font-size: 24px; font-weight: 700; fill: #111; }
        .axis-label { font-size: 13px; fill: #333; }
        .legend-label { font-size: 11px; fill: #333; }
        .legend-item { cursor: pointer; }
        .bar { cursor: pointer; }
        .pc-axis text { font-size: 11px; }
        .panel-border { fill: none; stroke: #ddd; stroke-width: 1; }
        .brush .selection { stroke: #333; stroke-dasharray: 3 2; fill-opacity: 0.08; }

        /* control bar sits in the empty top-left corner, above the SVG */
        #controls {
            position: absolute; top: 8px; left: 12px;
            display: flex; align-items: center; gap: 8px;
            font-size: 12px; color: #333; z-index: 10;
        }
        #controls button {
            font: inherit; padding: 4px 9px; border: 1px solid #bbb;
            border-radius: 4px; background: #fff; cursor: pointer; color: #222;
        }
        #controls button:hover { background: #f0f0f0; }
        #hint { color: #777; max-width: 360px; line-height: 1.3; }
    </style>
</head>
<body>
    <div id="controls">
        <button id="sort-btn">Sort: By count</button>
        <button id="clear-btn">Clear selection</button>
        <span id="hint">Click a type (bar or legend) to highlight it. Drag on the scatter to brush a subset.</span>
    </div>
    <svg></svg>
    <script src="https://d3js.org/d3.v5.min.js"></script>
    <script src="main.js"></script>
</body>
</html>
