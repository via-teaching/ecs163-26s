<!doctype html>
<html style="width:100%;height:100%;">
<head>
	<meta charset="utf-8">
	<meta name="description" content="interactive dashboard for visualizing student alcohol consumption data">
	<title>Student Alcohol Consumption Interactive Dashboard</title>
	<style>
		/*this style makes the tooltip look like a floating box*/
		#tooltip {
			position: absolute;
			opacity: 0; /*hidden by default*/
			background: white;
			border: 1px solid #ccc;
			padding: 10px;
			border-radius: 5px;
			pointer-events: none; /*prevents the tooltip from interfering with mouse clicks*/
			font-family: sans-serif;
			font-size: 12px;
			box-shadow: 2px 2px 5px rgba(0,0,0,0.2);
		}
	</style>
</head>
<body style="width:100%;height:100%;margin: 0;">
	
	<div id="tooltip"></div>

	<svg width="100%" height="100%">
	</svg>

	<script src="https://d3js.org/d3.v5.min.js"></script>
	<script src="main.js"></script>
</body>
</html>
