<html style="width:100%;height:100%;">
<head>
	<meta charset="utf-8">

	<title>D3 Example</title>
  <style>
    svg {display:block;}
    #dashboard { width: 100%;  }
    #top { width: 100%; }
    #bot { width: 100%;  display: flex; flex-direction: row; }
    #bot_left { width: 50% }
    #bot_right { width: 50% }

    /*viewbox setup*/
    #parallelcoords {
      width: 100%;
      height: 100%;
    }
    #barchart {
        width: 100%;
        height: 100%;
    }
    #heatmap {
        width: 100%;
        height: 100%;
    }
  </style>
</head>
<body style="width:100%;height:100%;margin: 0;">

  <div id ="dashboard"> <!--Big BOX-->
    <div id="top"> <!--Top half-->
      <svg id ="parallelcoords"></svg>
    </div>

    <div id="bot"> <!--Bot half-->
      <div id="bot_left"> 
        <svg id="barchart"></svg>
      </div>
      <div id="bot_right">
        <svg id="heatmap"></svg>
      </div>
    </div>
  </div>
