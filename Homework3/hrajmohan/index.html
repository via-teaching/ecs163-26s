<!doctype html>
<html lang="en" style="width:100%;height:100%;">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ECS 163 HW3 - Pokemon Dashboard</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      font-family: Arial, sans-serif;
      background: #f4f7fb;
      color: #1f2937;
    }
    #topbar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 12px;
      background: #0f172a;
      color: #e5e7eb;
      font-size: 13px;
    }
    #topbar button {
      border: 1px solid #94a3b8;
      background: #1e293b;
      color: #e5e7eb;
      border-radius: 4px;
      padding: 4px 10px;
      cursor: pointer;
    }
    #topbar button:hover { background: #334155; }
    #tooltip {
      position: fixed;
      pointer-events: none;
      visibility: hidden;
      background: rgba(15, 23, 42, 0.95);
      color: #fff;
      padding: 6px 8px;
      border-radius: 4px;
      font-size: 11px;
      line-height: 1.3;
      max-width: 240px;
      z-index: 10;
    }
    svg { display: block; }
  </style>
</head>
<body>
  <div id="topbar">
    <strong>Pokemon Stats Explorer (HW3)</strong>
    <span>Interactions: selection, brushing, zoom/pan</span>
    <span>Transition: filtering + ordering (animated)</span>
    <button id="reset-all">Reset All</button>
    <span id="status-text"></span>
  </div>
  <svg id="dashboard" width="100%" height="calc(100% - 40px)"></svg>
  <div id="tooltip"></div>

  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="main.js"></script>
</body>
</html>
