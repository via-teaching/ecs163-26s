<!doctype html>
<html style="width:100%; height:100%;">
<head>
  <meta charset="utf-8">
  <title>Music & Mental Health Dashboard</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #f9f9f9;
      font-family: Arial, sans-serif;
    }

    /* brush handle styling — keeps the drag handles visible and on top */
    .brush .handle {
      fill: #636e72;
      fill-opacity: 0.6;
    }

    /* brush selection rectangle — semi-transparent so axis labels show through */
    .brush .selection {
      fill: #b2bec3;
      fill-opacity: 0.35;
      stroke: #636e72;
      stroke-width: 1px;
    }

    /* up-down arrow cursor on brush overlay so it's obvious the axes are draggable */
    .brush .overlay {
      cursor: ns-resize;
    }

    /* reset button sits in the top-right corner of the header */
    #reset-btn {
      position: absolute;
      top: 11px;
      right: 14px;
      background: #636e72;
      color: #fff;
      border: none;
      border-radius: 4px;
      padding: 5px 12px;
      font-size: 11px;
      font-family: Arial, sans-serif;
      cursor: pointer;
      letter-spacing: 0.3px;
    }

    #reset-btn:hover {
      background: #fff;
      color: #2d3436;
    }
  </style>
</head>
<body style="width:100%; height:100%; margin:0;">

  <svg id="main-svg" width="100%" height="100%"></svg>
  <button id="reset-btn">Reset Brushes</button>

  <script src="https://d3js.org/d3.v5.min.js"></script>
  <script src="main.js"></script>

</body>
</html>
