<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>HW3 Cosmetics Dashboard</title>

  <script src="https://d3js.org/d3.v7.min.js"></script>

  <style>

    body{
      margin:0;
      font-family:'Times New Roman', serif;
      background:#f5f5f5;
    }

    h1{
      text-align:center;
      margin:10px;
      font-size:32px;
    }

    #controls{
      text-align:center;
      margin-bottom:10px;
    }

    button{
      padding:10px 20px;
      border:none;
      border-radius:5px;
      background:#444;
      color:white;
      cursor:pointer;
      font-size:16px;
    }

    button:hover{
      background:#222;
    }

    #dashboard{
      display:grid;
      grid-template-columns:1fr 1fr;
      grid-template-rows:55vh 45vh;
      gap:10px;
      padding:10px;
      height:90vh;
      box-sizing:border-box;
    }

    .panel{
      background:white;
      border-radius:10px;
      box-shadow:0 2px 8px rgba(0,0,0,0.15);
      padding:10px;
      overflow:hidden;
    }

    #parallelPanel{
      grid-row:1 / 3;
    }

    svg{
      width:100%;
      height:100%;
    }

    .tooltip{
      position:absolute;
      background:white;
      border:1px solid #ccc;
      padding:10px;
      border-radius:5px;
      pointer-events:none;
      opacity:0;
      font-size:14px;
    }

    .title{
      font-size:22px;
      font-weight:bold;
    }

    .axis-label{
      font-size:16px;
    }

  </style>
</head>

<body>

<h1>HW3 Cosmetics Visualization Dashboard</h1>

<div id="controls">
  <button id="resetBtn">Reset Filters</button>
</div>

<div id="dashboard">

  <div class="panel" id="parallelPanel">
    <svg id="parallelSVG"></svg>
  </div>

  <div class="panel">
    <svg id="heatmapSVG"></svg>
  </div>

  <div class="panel">
    <svg id="scatterSVG"></svg>
  </div>

</div>

<div class="tooltip" id="tooltip"></div>

<script src="https://d3js.org/d3.v7.min.js"></script>

<script src="globals.js"></script>

<script src="heatmap.js"></script>
<script src="parallel.js"></script>
<script src="scatterplot.js"></script>
<script src="main.js"></script>

</body>
</html>
