<!doctype html>
<html lang="en" style="width:100%;height:100%;">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Pokémon Visualization Dashboard</title>
	<link rel="stylesheet" href="style.css">
</head>
<body>
	<!-- dashboard header -->
	<div id="dashboard-title">Choose your Pokémon</div>

	<!-- top: scatter plot full width -->
	<div id="top-row">
		<div id="scatter-plot" class="chart-container"></div>
	</div>

	<!-- bottom: radar chart and bar chart side by side -->
	<div id="bottom-row">
		<div id="radar-chart" class="chart-container"></div>
		<div id="bar-chart" class="chart-container"></div>
	</div>

	<!-- d3 v7 -->
	<script src="https://d3js.org/d3.v7.min.js"></script>
	<script src="main.js"></script>
</body>
</html>
