<!doctype html>
<html style="width:100%;height:100%;">
<head>
	<meta charset="utf-8">
	<meta name="description" content="DS Salaries Dashboard">
	<title>Data Science Salaries Dashboard</title>
	<style>
		* { box-sizing: border-box; }
		body { margin: 0; background: #f5f6fa; font-family: sans-serif; }

		/* Tooltip */
		#tooltip {
			position: absolute;
			background: rgba(0,0,0,0.75);
			color: #fff;
			padding: 6px 10px;
			border-radius: 4px;
			font-size: 12px;
			pointer-events: none;
			opacity: 0;
			transition: opacity 0.15s;
		}

		/* Axis text */
		.axis text { font-size: 11px; fill: #444; }
		.axis path, .axis line { stroke: #bbb; }

		/* Parallel coords brush */
		.brush .selection { fill: steelblue; fill-opacity: 0.3; stroke: steelblue; }

		/* Legend */
		.legend-text { font-size: 11px; fill: #444; }
	</style>
</head>
<body style="width:100%;height:100%;margin:0;">

	<!-- Single SVG covering the full page, same as template -->
	<svg id="main-svg" width="100%" height="100%"></svg>

	<div id="tooltip"></div>

	<script src="https://d3js.org/d3.v5.min.js"></script>
	<script src="main.js"></script>
</body>
</html>
